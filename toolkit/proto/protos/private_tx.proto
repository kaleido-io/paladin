syntax = "proto3";

package io.kaleido.paladin.toolkit;

import "to_domain.proto";

// PublicTxOptions carries the user-supplied gas/value overrides for the base-ledger transaction.
// Uses hex-encoded string convention (matches PrivacyGroupEVMTX in to_domain.proto).
message PublicTxOptions {
  optional string gas = 1;                      // hex-encoded uint64 gas limit
  optional string value = 2;                    // hex-encoded uint256 value
  optional string max_fee_per_gas = 3;          // hex-encoded uint256 EIP-1559 max fee
  optional string max_priority_fee_per_gas = 4; // hex-encoded uint256 EIP-1559 priority fee
}

// TransactionPreAssembly holds all state that is stable across re-assemblies
message TransactionPreAssembly {
  TransactionSpecification transaction_specification = 1;
  repeated ResolveVerifierRequest required_verifiers = 2;
  PublicTxOptions public_tx_options = 3;
  repeated string chained_depends_on = 4; // UUID strings — ordering constraints from the parent coordinator
}

// PrivateTransactionDelegation is the minimal wire descriptor sent when an originator
// delegates a transaction to a coordinator
message PrivateTransactionDelegation {
  string id = 1;
  string domain = 2;
  TransactionSpecification.Intent intent = 3;
  TransactionPreAssembly pre_assembly = 4;
}
