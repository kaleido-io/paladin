task install(type: Exec) {
    // npm bug: optional native deps for rolldown aren't installed on first pass (https://github.com/npm/cli/issues/4828)
    executable 'bash'
    args '-c', 'npm install && npm install'

    inputs.files("package.json", "package-lock.json")
    outputs.dir("node_modules")
}

task build(type: Exec, dependsOn: install) {
    executable 'npm'
    args 'run'
    args 'build'

    inputs.dir("src")
    outputs.dir("dist")
}

task assemble {
    dependsOn build
}

task clean(type: Delete) {
    delete "node_modules"
    delete "dist"
}
